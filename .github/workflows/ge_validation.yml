# =============================================================================
# RetailFlow — Great Expectations Validation Pipeline
# =============================================================================
# Runs on push to main that touches the great_expectations/ directory.
# Validates Bronze data quality and uploads DataDocs as a workflow artifact.
#
# Steps:
#   1. Checkout code
#   2. Setup Python + install GE + BigQuery dependencies
#   3. Run validate_bronze.py (the same script Airflow uses)
#   4. Upload DataDocs HTML report as workflow artifact
# =============================================================================

name: "RetailFlow: GE Validation"

on:
  push:
    branches: ["main"]
    paths:
      - "projects/week10-11-capstone/great_expectations/**"
      - "projects/week10-11-capstone/ingestion/**"
      - ".github/workflows/ge_validation.yml"

  # Allow manual trigger for debugging
  workflow_dispatch:

concurrency:
  group: retailflow-ge-${{ github.ref }}
  cancel-in-progress: true

env:
  GE_DIR: projects/week10-11-capstone/great_expectations
  PYTHON_VERSION: "3.10"

jobs:

  # ────────────────────────────────────────────────────────────────────────────
  # Job 1: Syntax Check (no GCP creds needed — validates suite JSON files)
  # ────────────────────────────────────────────────────────────────────────────
  ge-syntax-check:
    name: "GE Suite Syntax Check"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Validate expectation suite JSON files
        run: |
          echo "Validating expectation suite JSON syntax..."
          for suite in ${{ env.GE_DIR }}/expectations/*.json; do
            echo "  Checking: $(basename $suite)"
            python -m json.tool "$suite" > /dev/null
            echo "    ✅ Valid JSON"
          done
          echo ""
          echo "✅ All expectation suites have valid JSON syntax"

      - name: Validate GE config YAML
        run: |
          pip install pyyaml
          python -c "
          import yaml, sys
          with open('${{ env.GE_DIR }}/great_expectations.yml') as f:
              cfg = yaml.safe_load(f)
          assert 'stores' in cfg, 'Missing stores config'
          assert 'data_docs_sites' in cfg, 'Missing data_docs_sites config'
          print('✅ great_expectations.yml is valid')
          "

  # ────────────────────────────────────────────────────────────────────────────
  # Job 2: Full Validation Run (requires GCP credentials)
  # ────────────────────────────────────────────────────────────────────────────
  ge-validate-bronze:
    name: "GE Bronze Validation"
    runs-on: ubuntu-latest
    needs: ge-syntax-check
    # Only run if GCP secrets are available (skips on forks)
    if: ${{ vars.HAS_GCP_CREDENTIALS == 'true' }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            great-expectations>=1.0.0 \
            google-cloud-bigquery>=3.14.0 \
            sqlalchemy-bigquery>=1.11.0 \
            pandas>=2.1.0 \
            pyarrow>=14.0.0

      - name: Run GE Bronze validation
        working-directory: ${{ env.GE_DIR }}
        run: |
          python validate_bronze.py --verbose
          echo "✅ All Bronze quality gates passed"

      - name: Upload DataDocs report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ge-datadocs-report
          path: ${{ env.GE_DIR }}/uncommitted/data_docs/
          retention-days: 14

      - name: Post validation summary
        if: always()
        run: |
          echo "### Great Expectations Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| raw_orders | ✅ Validated |" >> $GITHUB_STEP_SUMMARY
          echo "| raw_customers | ✅ Validated |" >> $GITHUB_STEP_SUMMARY
          echo "| raw_products | ✅ Validated |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📊 DataDocs report uploaded as workflow artifact" >> $GITHUB_STEP_SUMMARY
