# =============================================================================
# RetailFlow — dbt CI Pipeline
# =============================================================================
# Runs on every Pull Request that touches the dbt/ directory.
# Validates that all dbt models compile, run, and pass tests before merge.
#
# Steps:
#   1. Checkout code
#   2. Setup Python + install dbt-bigquery
#   3. dbt deps (install packages)
#   4. dbt compile (syntax check — always runs, no GCP needed)
#   5. dbt run --target ci --select staging (if GCP creds available)
#   6. dbt test --select staging (if GCP creds available)
#   7. Post summary to PR
# =============================================================================

name: "RetailFlow: dbt CI"

on:
  pull_request:
    branches: ["main"]
    paths:
      - "projects/week10-11-capstone/dbt/**"
      - ".github/workflows/dbt_ci.yml"

concurrency:
  group: retailflow-dbt-${{ github.ref }}
  cancel-in-progress: true

env:
  DBT_PROJECT_DIR: projects/week10-11-capstone/dbt
  PYTHON_VERSION: "3.10"

jobs:

  # ────────────────────────────────────────────────────────────────────────────
  # Job 1: Syntax & Compilation Check (always runs — no GCP creds needed)
  # ────────────────────────────────────────────────────────────────────────────
  dbt-compile:
    name: "dbt Compile Check"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.DBT_PROJECT_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dbt-bigquery
        run: |
          python -m pip install --upgrade pip
          pip install dbt-bigquery==1.8.*

      - name: Install dbt packages
        run: dbt deps --profiles-dir .

      - name: dbt compile (syntax validation)
        run: |
          dbt compile --profiles-dir . --target dev
          echo "✅ All dbt models compiled successfully"

      - name: Post compile summary
        if: always()
        run: |
          echo "### dbt Compile Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ $? -eq 0 ]; then
            echo "✅ All models compiled successfully" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Compilation failed — check logs above" >> $GITHUB_STEP_SUMMARY
          fi

  # ────────────────────────────────────────────────────────────────────────────
  # Job 2: Full dbt Run + Test (requires GCP credentials)
  # ────────────────────────────────────────────────────────────────────────────
  dbt-test:
    name: "dbt Run & Test"
    runs-on: ubuntu-latest
    needs: dbt-compile
    # Only run if GCP secrets are available (skips on forks)
    if: ${{ vars.HAS_GCP_CREDENTIALS == 'true' }}
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: ${{ env.DBT_PROJECT_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dbt-bigquery
        run: |
          python -m pip install --upgrade pip
          pip install dbt-bigquery==1.8.*

      - name: Install dbt packages
        run: dbt deps --profiles-dir .

      - name: "dbt run: staging models"
        run: |
          dbt run \
            --profiles-dir . \
            --target ci \
            --select tag:staging \
            --full-refresh
          echo "✅ Staging models ran successfully"

      - name: "dbt test: staging models"
        run: |
          dbt test \
            --profiles-dir . \
            --target ci \
            --select tag:staging
          echo "✅ All staging tests passed"

      - name: Post test summary
        if: always()
        run: |
          echo "### dbt Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| dbt compile | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| dbt run (staging) | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          echo "| dbt test (staging) | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
