name: CI Pipeline

on:
  push:
    branches: [ "main" ]
    paths:
      - "projects/week8-dataops-cicd/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "projects/week8-dataops-cicd/**"
      - ".github/workflows/ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ---------------------------------------------------------------------------
  # Job 1: Lint & Test
  # ---------------------------------------------------------------------------
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: projects/week8-dataops-cicd

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "projects/week8-dataops-cicd/etl/requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r etl/requirements.txt

      - name: Lint with ruff
        run: |
          ruff check etl/

      - name: Run tests with coverage
        run: |
          python -m pytest etl/tests/ -v \
            --cov=etl_pipeline \
            --cov-report=term-missing \
            --cov-fail-under=80
        env:
          PYTHONPATH: projects/week8-dataops-cicd/etl

  # ---------------------------------------------------------------------------
  # Job 2: Build & Push Docker Image to GCP Artifact Registry
  # Only runs if Job 1 passes
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test

    # These permissions are REQUIRED for Workload Identity Federation
    # id-token: allows GitHub to generate an OIDC token to prove its identity to GCP
    # contents: allows reading the repo code
    permissions:
      contents: read
      id-token: write

    defaults:
      run:
        working-directory: projects/week8-dataops-cicd

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Authenticate to GCP using Workload Identity Federation
      # No JSON key, no password — just a short-lived token
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      # Configure Docker to use gcloud credentials for Artifact Registry
      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker asia-south1-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build AND push the image to Artifact Registry
      # Tag with both the commit SHA (permanent, traceable) and 'latest' (convenient)
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: projects/week8-dataops-cicd
          dockerfile: projects/week8-dataops-cicd/Dockerfile
          push: true
          tags: |
            asia-south1-docker.pkg.dev/intricate-ward-459513-e1/week8-repo/week8-etl:${{ github.sha }}
            asia-south1-docker.pkg.dev/intricate-ward-459513-e1/week8-repo/week8-etl:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Smoke test — pull the image we just pushed and run it
      - name: Smoke test pushed image
        run: |
          IMAGE="asia-south1-docker.pkg.dev/intricate-ward-459513-e1/week8-repo/week8-etl:${{ github.sha }}"
          docker pull "$IMAGE"
          docker run --rm -e ENVIRONMENT=ci -e HIGH_VALUE_THRESHOLD=1000.0 "$IMAGE"

          # ---------------------------------------------------------------------------
  # Job 3: Terraform Plan
  # Shows infrastructure changes on every push
  # Only runs plan (never apply) in CI — apply is always manual
  # ---------------------------------------------------------------------------
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.5.0"

      - name: Terraform Init
        working-directory: projects/week8-dataops-cicd/infrastructure
        run: terraform init

      - name: Terraform Format Check
        working-directory: projects/week8-dataops-cicd/infrastructure
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Validate
        working-directory: projects/week8-dataops-cicd/infrastructure
        run: terraform validate

      - name: Terraform Plan
        working-directory: projects/week8-dataops-cicd/infrastructure
        run: |
          terraform plan -no-color 2>&1 | tee terraform-plan.txt
          echo "### Terraform Plan Output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat terraform-plan.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY