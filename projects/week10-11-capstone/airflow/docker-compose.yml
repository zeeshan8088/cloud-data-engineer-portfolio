# ============================================================
# RetailFlow — Local Airflow Setup (Docker Compose)
# ============================================================
# Based on the official Apache Airflow 2.8.x docker-compose.
# Stripped down to essential services for local development.
#
# SERVICES:
#   postgres   — Airflow metadata database
#   redis      — Celery broker (for CeleryExecutor)
#   airflow-init     — one-time DB init + admin user creation
#   airflow-webserver
#   airflow-scheduler
#   airflow-worker   (CeleryExecutor)
#
# USAGE:
#   1. Copy .env.example → .env and fill values
#   2. docker-compose up airflow-init   (first time only)
#   3. docker-compose up -d
#   4. Open http://localhost:8080  (admin / retailflow123)
#
# VOLUMES:
#   The entire retailflow project is mounted read-only at
#   /opt/airflow/retailflow so the DAG can access scripts.
#   The airflow/dags/ folder is mounted so Airflow picks up
#   retailflow_dag.py without rebuilding the image.
# ============================================================

x-airflow-common: &airflow-common
  image: retailflow-airflow:latest
  build:
    context: .
    dockerfile: Dockerfile
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: CeleryExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@postgres/airflow
    AIRFLOW__CELERY__BROKER_URL: redis://:@redis:6379/0
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'false'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session'
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    AIRFLOW__CORE__DEFAULT_TIMEZONE: 'Asia/Kolkata'
    # ── RetailFlow specific ─────────────────────────────────
    GCP_PROJECT: ${GCP_PROJECT:-intricate-ward-459513-e1}
    BQ_DATASET_META: ${BQ_DATASET_META:-retailflow_metadata}
    RETAILFLOW_HOME: /opt/airflow/retailflow
    DBT_BIN: /home/airflow/.local/bin/dbt
    GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/gcp-key.json
    PYTHONPATH: /opt/airflow/retailflow/ingestion:/opt/airflow/retailflow/great_expectations
  volumes:
    # DAG file
    - ./retailflow_dag.py:/opt/airflow/dags/retailflow_dag.py:ro
    # Entire project (read-only) — scripts, dbt, GE
    - ..:/opt/airflow/retailflow:ro
    # GCP service account key (place yours here)
    - ${GOOGLE_APPLICATION_CREDENTIALS:-~/.config/gcloud/application_default_credentials.json}:/opt/airflow/gcp-key.json:ro
    # Airflow logs (read-write)
    - airflow-logs:/opt/airflow/logs
    - airflow-plugins:/opt/airflow/plugins
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on: &airflow-common-depends-on
    redis:
      condition: service_healthy
    postgres:
      condition: service_healthy

services:

  # ── Infrastructure ──────────────────────────────────────────────
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  redis:
    image: redis:7.2-bookworm
    expose:
      - 6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 30s
      retries: 50
      start_period: 30s
    restart: always

  # ── One-time initialisation ─────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        echo "Initialising Airflow DB..."
        airflow db migrate
        echo "Creating admin user..."
        airflow users create \
          --username admin \
          --firstname Zeeshan \
          --lastname Yalakpalli \
          --role Admin \
          --email zeeshan@retailflow.dev \
          --password retailflow123
        echo "✅ Airflow init complete."
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
    user: "0:0"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Core Airflow services ───────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-worker:
    <<: *airflow-common
    command: celery worker
    healthcheck:
      test:
        - "CMD-SHELL"
        - 'celery --app airflow.providers.celery.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}" || celery --app airflow.executors.celery_executor.app inspect ping -d "celery@$${HOSTNAME}"'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      <<: *airflow-common-env
      DUMB_INIT_SETSID: "0"
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres-db:
  airflow-logs:
  airflow-plugins:
