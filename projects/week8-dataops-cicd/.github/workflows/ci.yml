# =============================================================================
# CI Workflow — Week 8 DataOps
# Triggers on every push and pull request to main branch
# Jobs:
#   1. test  — lint with ruff, run pytest with coverage
#   2. build — build Docker image (only if tests pass)
# =============================================================================

name: CI Pipeline

on:
  push:
    branches: [ "main" ]
    paths:
      # Only trigger when relevant files change — saves CI minutes
      - "projects/week8-dataops-cicd/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "projects/week8-dataops-cicd/**"
      - ".github/workflows/ci.yml"

# Cancel any in-progress run for the same branch when a new push arrives
# Prevents queue buildup when you push multiple times quickly
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ---------------------------------------------------------------------------
  # Job 1: Test
  # Runs linting and unit tests
  # ---------------------------------------------------------------------------
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        # All steps in this job run from inside the project folder
        working-directory: projects/week8-dataops-cicd

    steps:
      # Step 1: Check out the repository code onto the runner machine
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install Python 3.11 (matches our Dockerfile)
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          # Cache pip downloads so repeated runs are faster
          cache: "pip"
          cache-dependency-path: "projects/week8-dataops-cicd/etl/requirements.txt"

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r etl/requirements.txt

      # Step 4: Run ruff linter
      # ruff checks for code style issues, unused imports, bad practices
      # If ruff fails, the job stops here — no point running tests on messy code
      - name: Lint with ruff
        run: |
          ruff check etl/

      # Step 5: Run pytest with coverage
      - name: Run tests with coverage
        run: |
          python -m pytest etl/tests/ -v \
            --cov=etl/etl_pipeline \
            --cov-report=term-missing \
            --cov-fail-under=80

      # Step 6: Upload coverage report as a workflow artifact
      # This lets you download the HTML coverage report from the GitHub Actions UI
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()   # Upload even if tests fail — useful for debugging
        with:
          name: coverage-report
          path: projects/week8-dataops-cicd/.coverage
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 2: Build Docker Image
  # Only runs if the test job passes
  # Confirms the Dockerfile builds successfully on every push
  # (We'll push to Artifact Registry on Day 3)
  # ---------------------------------------------------------------------------
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test   # This is the key line — build waits for test to succeed

    defaults:
      run:
        working-directory: projects/week8-dataops-cicd

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Set up Docker Buildx — the modern Docker build engine
      # Supports multi-platform builds and better caching than plain docker build
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build the image — but don't push it yet (that's Day 3)
      # --load makes the image available locally on the runner for verification
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: projects/week8-dataops-cicd
          dockerfile: projects/week8-dataops-cicd/Dockerfile
          push: false
          load: true
          tags: week8-etl:ci-${{ github.sha }}
          # Cache layers between runs — makes builds much faster
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Smoke test — actually run the container and confirm it exits successfully
      # If the pipeline crashes inside the container, this step fails
      - name: Smoke test — run container
        run: |
          docker run --rm \
            -e ENVIRONMENT=ci \
            -e HIGH_VALUE_THRESHOLD=1000.0 \
            week8-etl:ci-${{ github.sha }}

      # Report the image size so you can track it over time in the Actions log
      - name: Report image size
        run: |
          docker images week8-etl:ci-${{ github.sha }} \
            --format "Image size: {{.Size}}"